# Streamlit theme — refined dark palette tuned to match the custom CSS in ui.py.
[theme]
base = "dark"
primaryColor = "#30d158"            # Apple green accent (buttons, focus, slider)
backgroundColor = "#0a0c10"         # app background
secondaryBackgroundColor = "#13171e" # cards, sidebar, inputs
textColor = "#eef1f5"
font = "sans-serif"
baseRadius = "0.7rem"
